<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><link rel="icon" type="image/png" href="logo Vm.png" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Vamorax</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script>history.replaceState(null,'','/forgot-password')</script>
</head>
<body>
<div id="top-progress"></div>
<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
</div>

<div class="page-content">
<div class="auth-wrap">
  <div class="auth-card">

    <div style="margin-bottom:28px">
      <a href="login.html" style="font-size:12px;color:var(--text-3);display:inline-flex;align-items:center;gap:5px;margin-bottom:20px;transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-3)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to sign in
      </a>
      <div style="font-size:12px;color:var(--text-3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Vamorax</div>
      <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px">Forgot password?</h1>
      <p style="font-size:13px;color:var(--text-2);line-height:1.6">Enter your email and we'll send you a link to reset your password.</p>
    </div>

    <!-- Step 1: Email input -->
    <div id="step-email">
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="resetEmail" placeholder="your@email.com" required autofocus />
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center" id="sendBtn">Send reset link</button>
      </form>
    </div>

    <!-- Step 2: Success message -->
    <div id="step-sent" style="display:none;text-align:center;padding:8px 0">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <h2 style="font-size:16px;font-weight:600;margin-bottom:8px">Check your email</h2>
      <p style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:20px">We sent a password reset link to <strong id="sentTo" style="color:var(--text)"></strong>. Check your inbox and click the link.</p>
      <p style="font-size:12px;color:var(--text-3)">Didn't receive it? Check spam or <button id="resendBtn" style="font-size:12px;color:var(--text-2);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0">resend</button> <span id="cooldownTxt" style="display:none"></span></p>
      <a href="login.html" class="btn btn-ghost btn-sm" style="margin-top:20px;justify-content:center;width:100%">Back to sign in</a>
    </div>

  </div>
</div>
</div>

<script type="module">
  import { initTheme, startProgress, doneProgress, showToast } from './js/ui.js';
  import { auth, sendPasswordResetEmail } from './js/firebase-config.js';
  import { initPageTransition } from './js/transition.js';

  initPageTransition(); startProgress(); initTheme(); doneProgress();

  const form    = document.getElementById('forgot-form');
  const sendBtn = document.getElementById('sendBtn');
  const step1   = document.getElementById('step-email');
  const step2   = document.getElementById('step-sent');
  const sentTo  = document.getElementById('sentTo');
  let lastEmail = '';
  let cooldownTimer = null;
  const resendBtn   = document.getElementById('resendBtn');
  const cooldownTxt = document.getElementById('cooldownTxt');

  function startCooldown() {
    let secs = 60;
    resendBtn.disabled = true;
    resendBtn.style.opacity = '0.4';
    resendBtn.style.cursor = 'default';
    cooldownTxt.style.display = 'inline';
    cooldownTxt.textContent = `(${secs}s)`;
    cooldownTimer = setInterval(() => {
      secs--;
      cooldownTxt.textContent = `(${secs}s)`;
      if (secs <= 0) {
        clearInterval(cooldownTimer);
        resendBtn.disabled = false;
        resendBtn.style.opacity = '1';
        resendBtn.style.cursor = 'pointer';
        cooldownTxt.style.display = 'none';
      }
    }, 1000);
  }

  async function sendReset(email) {
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner"></span> Sending...';
    try {
      await sendPasswordResetEmail(auth, email);
      lastEmail = email;
      sentTo.textContent = email;
      step1.style.display = 'none';
      step2.style.display = 'block';
    } catch (err) {
      console.error('Reset error:', err.code, err.message);
      const msg = err.code === 'auth/user-not-found'
        ? 'No account found with this email.'
        : err.code === 'auth/invalid-email'
        ? 'Invalid email address.'
        : err.code === 'auth/too-many-requests'
        ? 'Too many attempts. Try again later.'
        : err.code === 'auth/network-request-failed'
        ? 'Network error. Check your connection.'
        : `Failed: ${err.code || err.message}`;
      showToast(msg, 'error');
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send reset link';
    }
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    sendReset(document.getElementById('resetEmail').value.trim());
  });

  resendBtn.addEventListener('click', () => {
    if (lastEmail && !resendBtn.disabled) {
      sendReset(lastEmail);
      startCooldown();
    }
  });
</script>
</body>
</html>
