<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo Vm.png" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vamorax Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { opacity: 1 !important; }

    /* Gate */
    #gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .gate-box {
      width: 100%; max-width: 340px;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 32px;
    }

    /* Admin layout */
    #app { display: none; min-height: 100vh; }

    /* Modal */
    .adm-modal {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .adm-modal.open { display: flex; }
    .adm-modal-box {
      background: var(--bg-2); border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg); padding: 28px;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      animation: modalIn 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform: translateY(16px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Preset admin card */
    .admin-card {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .admin-card-media {
      height: 120px; background: linear-gradient(135deg,#1a1a20,#111116);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .admin-card-body { padding: 14px; }
    .admin-card-actions { display: flex; gap: 6px; margin-top: 10px; }
    .admin-card-actions button { flex: 1; justify-content: center; }

    /* Grid */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .admin-empty {
      grid-column: 1/-1; padding: 60px;
      text-align: center; color: var(--text-3); font-size: 13px;
    }

    /* Toolbar */
    .admin-toolbar {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 24px;
    }
  </style>
  <script>history.replaceState(null,'','/admin')</script>
</head>
<body>

<!-- ── LOGIN GATE ── -->
<div id="gate">
  <div class="gate-box">
    <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px">Vamorax</div>
    <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:24px">Admin Access</h1>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="passInput" placeholder="Enter password" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary w-full" style="justify-content:center" id="loginBtn">Enter</button>
    <p id="loginErr" style="font-size:12px;color:#ef4444;margin-top:10px;display:none">Wrong password.</p>
  </div>
</div>

<!-- ── ADMIN APP ── -->
<div id="app">
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg viewBox="0 0 100 100"><path d="M25 30 Q50 60 75 30"/><path d="M25 75 L25 60 Q35 58 50 75 Q65 58 75 60 L75 75"/></svg>
    </a>
    <div class="navbar-actions">
      <button class="icon-btn theme-toggle" id="themeBtn"></button>
      <a href="index.html" class="btn btn-ghost btn-sm">← Site</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <div style="padding: 88px 32px 32px">
    <div style="margin-bottom:32px">
      <span style="font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3)">Admin Panel</span>
      <h1 style="font-size:28px;font-weight:700;letter-spacing:-1px;margin-top:6px">Preset Manager</h1>
      <p style="font-size:14px;color:var(--text-2);margin-top:4px">Add, edit, and delete presets. Saves to local storage.</p>
    </div>

    <div class="admin-toolbar">
      <div class="filter-tabs" id="tabBar">
        <button class="filter-tab active" data-tab="all">All Presets</button>
        <button class="filter-tab" data-tab="paid">Paid</button>
        <button class="filter-tab" data-tab="free">Free</button>
        <button class="filter-tab" data-tab="trending">Trending</button>
        <button class="filter-tab" data-tab="tutorials">Tutorials</button>
      </div>
      <button class="btn btn-primary" id="addBtn">+ Add Preset</button>
    </div>

    <div class="admin-grid" id="grid"></div>
  </div>
</div>

<!-- ── PRESET FORM MODAL ── -->
<div class="adm-modal" id="formModal">
  <div class="adm-modal-box">
    <h2 style="font-size:15px;font-weight:600;margin-bottom:20px" id="formTitle">Add Preset</h2>
    <form id="presetForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input class="form-input" name="name" placeholder="e.g. Neon Velocity" required />
      </div>
      <!-- Free toggle first -->
      <div style="display:flex;gap:20px;margin-bottom:16px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;color:var(--text-2)">
          <input type="checkbox" name="isFree" id="isFreeCheck" /> Free preset
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;color:var(--text-2)">
          <input type="checkbox" name="isTrending" /> Trending
        </label>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-input" name="category" required>
            <option value="">Select</option>
            <option value="cinematic">Cinematic</option>
            <option value="velocity">Velocity</option>
            <option value="beat-sync">Beat Sync</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group" id="priceGroup">
          <label class="form-label">Price (Rp)</label>
          <input class="form-input" name="price" type="number" min="0" placeholder="5000" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input class="form-input" name="tags" placeholder="cinematic, fade, smooth" />
      </div>
      <div class="form-group">
        <label class="form-label">Link File <span style="color:var(--text-3);font-weight:400">(ZIP / XML / RAR — Google Drive, dll)</span></label>
        <input class="form-input" name="downloadUrl" placeholder="https://drive.google.com/file/d/..." />
        <div style="font-size:11px;color:var(--text-3);margin-top:6px">Upload ke Google Drive → Share → Anyone with link → Copy link</div>
      </div>
      <div class="form-group">
        <label class="form-label">Link Alight Motion <span style="color:var(--text-3);font-weight:400">(alightmotion.com/preset/...)</span></label>
        <input class="form-input" name="alightUrl" placeholder="https://alightmotion.com/preset/..." />
      </div>
      <div class="form-group">
        <label class="form-label">Thumbnail Image URL <span style="color:var(--text-3);font-weight:400">(imgur, imgbb, dll)</span></label>
        <input class="form-input" name="imageUrl" id="imageUrlInput" placeholder="https://i.imgur.com/..." />
      </div>
      <input type="hidden" name="editId" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="button" class="btn btn-ghost btn-sm" id="formCancel">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm" id="formSave">Save preset</button>
      </div>
    </form>
  </div>
</div>

<!-- ── DELETE MODAL ── -->
<div class="adm-modal" id="delModal">
  <div class="adm-modal-box" style="max-width:320px">
    <p style="font-size:14px;font-weight:500;margin-bottom:20px;text-align:center">Delete this preset? This cannot be undone.</p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" id="delCancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="delConfirm" style="background:#ef4444;border-color:#ef4444">Delete</button>
    </div>
  </div>
</div>

<script type="module">
  // ── Theme ──
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const themeBtn = document.getElementById('themeBtn');
  function updateThemeIcon() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeBtn.innerHTML = dark
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`;
  }
  updateThemeIcon();
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  });

  // ── Config ──
  const PASS = 'vamorax2025';

  // ── Firebase imports (module script) ──
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
  const { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc, serverTimestamp }
    = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
  const { getStorage, ref, uploadBytesResumable, getDownloadURL }
    = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js");

  const firebaseConfig = {
    apiKey: "AIzaSyAodUP4ovThYhIqyYSWnhtpL_KrhB6pILo",
    authDomain: "webbang-32962.firebaseapp.com",
    projectId: "webbang-32962",
    storageBucket: "webbang-32962.firebasestorage.app",
    messagingSenderId: "721233682498",
    appId: "1:721233682498:web:4f6148d2424f7fe9174ddb"
  };
  const fbApp = initializeApp(firebaseConfig, 'admin');
  const db    = getFirestore(fbApp);

  // ── Gate ──
  const gate     = document.getElementById('gate');
  const app      = document.getElementById('app');
  const passEl   = document.getElementById('passInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginErr = document.getElementById('loginErr');

  function showApp()  { gate.style.display = 'none';  app.style.display = 'block'; loadAndRender(); }
  function showGate() { gate.style.display = 'flex';  app.style.display = 'none'; passEl.value = ''; setTimeout(() => passEl.focus(), 60); }

  if (sessionStorage.getItem('adm') === '1') showApp(); else showGate();

  loginBtn.addEventListener('click', () => {
    if (passEl.value === PASS) { sessionStorage.setItem('adm','1'); loginErr.style.display='none'; showApp(); }
    else { loginErr.style.display='block'; passEl.value=''; passEl.focus(); }
  });
  passEl.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
  document.getElementById('logoutBtn').addEventListener('click', () => { sessionStorage.removeItem('adm'); showGate(); });

  // ── Firestore data ──
  let allPresets = [];

  async function loadAndRender() {
    const grid = document.getElementById('grid');
    grid.innerHTML = `<div class="admin-empty">Loading...</div>`;
    try {
      const snap = await getDocs(collection(db, 'presets'));
      allPresets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {
      grid.innerHTML = `<div class="admin-empty" style="color:#ef4444">Failed to load. Check Firestore rules.<br><small>${e.message}</small></div>`;
      return;
    }
    await loadTutorials();
    renderTab();
  }

  // ── Render ──
  let tab = 'all', delId = null;

  function renderTab() {
    const grid = document.getElementById('grid');
    let list = allPresets;
    if (tab === 'paid')     list = list.filter(p => !p.isFree);
    if (tab === 'free')     list = list.filter(p =>  p.isFree);
    if (tab === 'trending') list = list.filter(p =>  p.isTrending);

    if (!list.length) {
      grid.innerHTML = `<div class="admin-empty">No presets here yet.<br><br>
        <button class="btn btn-primary btn-sm" onclick="openForm()">+ Add your first preset</button></div>`;
      return;
    }

    grid.innerHTML = list.map(p => `
      <div class="admin-card">
        <div class="admin-card-media" style="background:${p.imageUrl?`url('${p.imageUrl}') center/cover`:'linear-gradient(135deg,#1a1a20,#111116)'}">
          ${!p.imageUrl?`<span style="font-size:20px;font-weight:700;color:var(--text-3)">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</span>`:''}
          <span class="preset-badge ${p.isFree?'badge-free':'badge-paid'}" style="position:absolute;top:8px;left:8px">${p.isFree?'Free':'Rp '+Number(p.price).toLocaleString('id-ID')}</span>
          ${p.isTrending?`<span class="preset-badge" style="position:absolute;top:8px;right:8px;background:rgba(255,170,0,0.15);color:#ffaa00;border-color:rgba(255,170,0,0.3)">Trending</span>`:''}
        </div>
        <div class="admin-card-body">
          <div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">${(p.category||'').replace('-',' ')}</div>
          <div style="font-size:14px;font-weight:600;margin-bottom:8px">${p.name}</div>
          <div style="font-size:13px;color:var(--text-2)">${p.isFree?'Free':'Rp '+Number(p.price).toLocaleString('id-ID')}</div>
          <div class="admin-card-actions">
            <button class="btn btn-ghost btn-sm" onclick="openForm('${p.id}')">Edit</button>
            <button class="btn btn-sm" style="background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)" onclick="openDel('${p.id}')">Delete</button>
          </div>
        </div>
      </div>`).join('');
  }

  // ── Tabs ──
  document.querySelectorAll('#tabBar .filter-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#tabBar .filter-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active'); tab = t.dataset.tab;
      if (tab === 'tutorials') { renderTutorials(); return; }
      renderTab();
    });
  });
  document.getElementById('addBtn').addEventListener('click', () => {
    if (tab === 'tutorials') { openTutorialForm(); return; }
    openForm();
  });

  // ── Form modal ──
  const formModal = document.getElementById('formModal');
  const form      = document.getElementById('presetForm');
  const storage   = getStorage(fbApp);

  // ── Free toggle hides price field ──
  document.getElementById('isFreeCheck').addEventListener('change', e => {
    document.getElementById('priceGroup').style.display = e.target.checked ? 'none' : '';
  });

  window.openForm = function(id) {
    form.reset();
    document.getElementById('uploadProgress') && (document.getElementById('uploadProgress').style.display = 'none');
    document.getElementById('priceGroup').style.display = '';
    const p = id ? allPresets.find(x => x.id === id) : null;
    document.getElementById('formTitle').textContent = p ? 'Edit Preset' : 'Add Preset';
    document.getElementById('formSave').textContent  = p ? 'Save changes' : 'Save preset';
    if (p) {
      form.name.value         = p.name || '';
      form.category.value     = p.category || '';
      form.price.value        = p.price ?? 5000;
      form.tags.value         = (p.tags||[]).join(', ');
      form.downloadUrl.value  = p.downloadUrl || '';
      if (form.alightUrl) form.alightUrl.value = p.alightUrl || '';
      const imgUrlInput = document.getElementById('imageUrlInput');
      if (imgUrlInput) imgUrlInput.value = p.imageUrl || '';
      // Set checkboxes explicitly
      const isFreeCheck     = form.querySelector('[name="isFree"]');
      const isTrendingCheck = form.querySelector('[name="isTrending"]');
      if (isFreeCheck)     isFreeCheck.checked     = !!p.isFree;
      if (isTrendingCheck) isTrendingCheck.checked = !!p.isTrending;
      form.editId.value = p.id;
      // Show/hide price based on isFree
      document.getElementById('priceGroup').style.display = p.isFree ? 'none' : '';
    }
    formModal.classList.add('open');
  };

  function closeForm() { formModal.classList.remove('open'); }
  document.getElementById('formCancel').addEventListener('click', closeForm);
  formModal.addEventListener('click', e => { if (e.target === formModal) closeForm(); });

  function toast(msg, ok = true) {
    const t = document.createElement('div');
    t.className = `toast toast-${ok ? 'success' : 'error'}`;
    t.innerHTML = `<span class="toast-dot"></span><span>${msg}</span>`;
    let c = document.querySelector('.toast-container');
    if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
    c.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const btn    = document.getElementById('formSave');
    const editId = form.editId.value;
    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      let imageUrl = (document.getElementById('imageUrlInput')?.value || '').trim() || (allPresets.find(x => x.id === editId)?.imageUrl) || '';
      // Upload preset file if selected
      let downloadUrl = form.downloadUrl.value.trim();

      const isFree     = !!form.querySelector('[name="isFree"]')?.checked;
      const isTrending = !!form.querySelector('[name="isTrending"]')?.checked;
      const data = {
        name:        form.name.value.trim(),
        category:    form.category.value,
        price:       isFree ? 0 : Number(form.price.value) || 5000,
        tags:        form.tags.value.split(',').map(t=>t.trim()).filter(Boolean),
        downloadUrl:  downloadUrl || '',
        imageUrl:     imageUrl || '',
        alightUrl:    (form.querySelector('[name="alightUrl"]')?.value || '').trim(),
        isFree,
        isTrending,
        updatedAt:   serverTimestamp(),
      };

      btn.textContent = 'Saving...';
      if (editId) {
        await updateDoc(doc(db, 'presets', editId), data);
        toast('Preset updated');
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(db, 'presets'), data);
        toast('Preset added');
      }
      closeForm();
      await loadAndRender();
    } catch(err) {
      toast('Failed: ' + err.message, false);
    }
    btn.disabled = false; btn.textContent = editId ? 'Save changes' : 'Save preset';
  });

  // ── Tutorial management ──
  let allTutorials = [];

  async function loadTutorials() {
    try {
      const snap = await getDocs(collection(db, 'tutorials'));
      allTutorials = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { allTutorials = []; }
  }

  function renderTutorials() {
    const grid = document.getElementById('grid');
    if (!allTutorials.length) {
      grid.innerHTML = `<div class="admin-empty">No tutorials yet.<br><br>
        <button class="btn btn-primary btn-sm" onclick="openTutorialForm()">+ Add tutorial</button></div>`;
      return;
    }
    grid.innerHTML = allTutorials.map(t => `
      <div class="admin-card">
        <div class="admin-card-media" style="background:linear-gradient(135deg,#1a1a20,#111116);cursor:pointer" ${t.videoUrl?`onclick="window.open('${t.videoUrl}','_blank')"`:''}>
          <span style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px">${(t.category||'').replace('-',' ')}</span>
          ${t.videoUrl?`<span class="preset-badge badge-free" style="position:absolute;top:8px;right:8px">YT</span>`:''}
        </div>
        <div class="admin-card-body">
          <div style="font-size:14px;font-weight:600;margin-bottom:4px">${t.title||''}</div>
          <div style="font-size:12px;color:var(--text-3);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||''}</div>
          <div class="admin-card-actions">
            <button class="btn btn-ghost btn-sm" onclick="openTutorialForm('${t.id}')">Edit</button>
            <button class="btn btn-sm" style="background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)" onclick="openDel('${t.id}','tutorial')">Delete</button>
          </div>
        </div>
      </div>`).join('');
  }

  // Tutorial form modal — reuse adm-modal with different content
  window.openTutorialForm = function(id) {
    const t = id ? allTutorials.find(x => x.id === id) : null;
    const modal = document.createElement('div');
    modal.className = 'adm-modal open';
    modal.id = 'tutModal';
    modal.innerHTML = `
      <div class="adm-modal-box">
        <h2 style="font-size:15px;font-weight:600;margin-bottom:20px">${t ? 'Edit Tutorial' : 'Add Tutorial'}</h2>
        <form id="tutForm">
          <div class="form-group"><label class="form-label">Title *</label><input class="form-input" name="title" value="${t?.title||''}" required /></div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-input" name="category">
              <option value="install" ${t?.category==='install'?'selected':''}>Install</option>
              <option value="create" ${t?.category==='create'?'selected':''}>Create</option>
              <option value="effects" ${t?.category==='effects'?'selected':''}>Effects</option>
              <option value="curve" ${t?.category==='curve'?'selected':''}>Curve Editor</option>
              <option value="advanced" ${t?.category==='advanced'?'selected':''}>Advanced</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" name="description" rows="2">${t?.description||''}</textarea></div>
          <div class="form-group"><label class="form-label">YouTube URL</label><input class="form-input" name="videoUrl" placeholder="https://youtube.com/watch?v=..." value="${t?.videoUrl||''}" /></div>
          <div class="form-group"><label class="form-label">Steps (one per line)</label><textarea class="form-input" name="steps" rows="4" placeholder="Step 1&#10;Step 2">${(t?.steps||[]).join('\n')}</textarea></div>
          <input type="hidden" name="editId" value="${t?.id||''}" />
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
            <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('tutModal').remove()">Cancel</button>
            <button type="submit" class="btn btn-primary btn-sm">${t ? 'Save changes' : 'Add tutorial'}</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    modal.querySelector('#tutForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target;
      const data = {
        title:       f.title.value.trim(),
        category:    f.category.value,
        description: f.description.value.trim(),
        videoUrl:    f.videoUrl.value.trim(),
        steps:       f.steps.value.split('\n').map(s=>s.trim()).filter(Boolean),
        updatedAt:   serverTimestamp(),
      };
      const editId = f.editId.value;
      try {
        if (editId) { await updateDoc(doc(db, 'tutorials', editId), data); toast('Tutorial updated'); }
        else { data.createdAt = serverTimestamp(); await addDoc(collection(db, 'tutorials'), data); toast('Tutorial added'); }
        modal.remove();
        await loadTutorials();
        renderTutorials();
      } catch(err) { toast('Failed: ' + err.message, false); }
    });
  };

  // ── Delete modal ──
  const delModal = document.getElementById('delModal');
  let delCollection = 'presets';
  window.openDel = function(id, col = 'presets') { delId = id; delCollection = col; delModal.classList.add('open'); };
  document.getElementById('delCancel').addEventListener('click', () => { delModal.classList.remove('open'); delId = null; });
  delModal.addEventListener('click', e => { if (e.target === delModal) { delModal.classList.remove('open'); delId = null; } });
  document.getElementById('delConfirm').addEventListener('click', async () => {
    if (!delId) return;
    try {
      await deleteDoc(doc(db, delCollection, delId));
      toast(delCollection === 'tutorials' ? 'Tutorial deleted' : 'Preset deleted');
      delModal.classList.remove('open'); delId = null;
      await loadAndRender();
      if (tab === 'tutorials') renderTutorials(); else renderTab();
    } catch(err) {
      toast('Delete failed: ' + err.message, false);
    }
  });
</script>
</body>
</html>
