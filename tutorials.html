<div class="page-content">
<div class="page-header">
  <span class="page-header-label">Learn</span>
  <h1 class="page-header-title fade-up">Tutorials</h1>
  <p class="page-header-sub">Master Alight Motion with step-by-step guides.</p>
</div>

<section class="section" style="padding-top:0">
  <div class="container">
    <!-- Mobile dropdown filter -->
    <div class="filter-dropdown" id="tutFilterDropdown">
      <button class="filter-dropdown-btn" id="tutDropdownBtn">
        <span id="tutDropdownLabel">All</span>
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="filter-dropdown-list">
        <button class="filter-dropdown-item active" data-filter="all">All</button>
        <button class="filter-dropdown-item" data-filter="install">Install</button>
        <button class="filter-dropdown-item" data-filter="create">Create</button>
        <button class="filter-dropdown-item" data-filter="effects">Effects</button>
        <button class="filter-dropdown-item" data-filter="curve">Curve Editor</button>
        <button class="filter-dropdown-item" data-filter="advanced">Advanced</button>
      </div>
    </div>
    <!-- Desktop tab filter -->
    <div class="filter-tabs" id="tutFilter">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="install">Install</button>
      <button class="filter-tab" data-filter="create">Create</button>
      <button class="filter-tab" data-filter="effects">Effects</button>
      <button class="filter-tab" data-filter="curve">Curve Editor</button>
      <button class="filter-tab" data-filter="advanced">Advanced</button>
    </div>

    <div class="tutorial-grid" id="tutGrid">
      <div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--text-3);font-size:13px">Loading tutorials...</div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom"><span>© 2025 Vamorax</span><span>Made for creators</span></div>
</footer>
</div><!-- /page-content -->

<script type="module">
  import { initTheme, toggleTheme, startProgress, doneProgress, initScrollReveal, initSmoothScroll, initMobileNav, showToast } from './js/ui.js';
  import { initCartSidebar } from './js/cart.js';
  import { updateNavAuth } from './js/auth.js';
  import { initNavPill } from './js/navbar.js';
  import { initPageTransition } from './js/transition.js';
  import { initWaveBackground } from './js/animations.js';
  import { db, collection, getDocs } from './js/firebase-config.js';

  window.toggleTheme = toggleTheme;
  initPageTransition();
  startProgress(); initTheme(); initScrollReveal(); initSmoothScroll(); initMobileNav(); initCartSidebar(); updateNavAuth(); initNavPill();
  initWaveBackground();
  setTimeout(() => document.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible')), 80);

  let allTutorials = [];

  // Load tutorials from Firestore
  async function loadTutorials() {
    const grid = document.getElementById('tutGrid');
    try {
      const snap = await getDocs(collection(db, 'tutorials'));
      allTutorials = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {
      console.warn('Could not load tutorials:', e.message);
    }
    renderTutorials('all');
  }

  function renderTutorials(filter) {
    const grid = document.getElementById('tutGrid');
    const list = filter === 'all' ? allTutorials : allTutorials.filter(t => t.category === filter);
    if (!list.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--text-3);font-size:13px">No tutorials yet.</div>`;
      return;
    }
    grid.innerHTML = list.map(t => `
      <div class="tutorial-card" data-category="${t.category||''}">
        <div class="tutorial-cat">${(t.category||'').replace('-',' ')}</div>
        <h3 class="tutorial-title">${t.title||''}</h3>
        <p class="tutorial-desc">${t.description||''}</p>
        ${t.videoUrl ? `
          <a href="${t.videoUrl}" target="_blank" rel="noopener" class="tutorial-video" style="text-decoration:none">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          </a>` : `
          <div class="tutorial-video">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          </div>`}
        ${t.steps?.length ? `<div class="tutorial-steps">${t.steps.map((s,i) => `
          <div class="tutorial-step"><span class="tutorial-step-num">${String(i+1).padStart(2,'0')}</span><span>${s}</span></div>`).join('')}
        </div>` : ''}
      </div>`).join('');
  }

  loadTutorials();

  // Shared filter
  function applyFilter(f) { renderTutorials(f); }

  // Desktop tabs
  document.querySelectorAll('#tutFilter .filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('#tutFilter .filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      applyFilter(tab.dataset.filter);
    });
  });

  // Mobile dropdown
  const dropdown = document.getElementById('tutFilterDropdown');
  const dropdownBtn = document.getElementById('tutDropdownBtn');
  const dropdownLabel = document.getElementById('tutDropdownLabel');

  dropdownBtn?.addEventListener('click', () => dropdown.classList.toggle('open'));

  document.querySelectorAll('#tutFilterDropdown .filter-dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('#tutFilterDropdown .filter-dropdown-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      dropdownLabel.textContent = item.textContent;
      dropdown.classList.remove('open');
      applyFilter(item.dataset.filter);
    });
  });

  // Close dropdown on outside click
  document.addEventListener('click', e => {
    if (dropdown && !dropdown.contains(e.target)) dropdown.classList.remove('open');
  });
  document.querySelectorAll('.tutorial-video').forEach(v => {
    v.addEventListener('click', () => showToast('Video tutorial coming soon', 'info'));
  });
  doneProgress();
</script>
</body>
