<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><link rel="icon" type="image/png" href="logo Vm.png" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — Vamorax</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script>history.replaceState(null,'','/verify-email')</script>
</head>
<body>
<div id="top-progress"></div>
<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
</div>

<div class="page-content">
<div class="auth-wrap">
  <div class="auth-card" style="text-align:center">

    <div style="width:64px;height:64px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>

    <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px">Check your email</h1>
    <p style="font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:6px">
      We sent a verification link to
    </p>
    <p style="font-size:14px;font-weight:600;margin-bottom:20px" id="emailDisplay">your email</p>
    <p style="font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:28px">
      Click the link in the email to verify your account. After verifying, come back and click the button below.
    </p>

    <button class="btn btn-primary w-full" style="justify-content:center;margin-bottom:12px" id="checkBtn">
      I've verified my email
    </button>

    <p style="font-size:12px;color:var(--text-3);margin-bottom:4px">
      Didn't receive it? Check spam or
      <button id="resendBtn" style="font-size:12px;color:var(--text-2);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0">resend</button>
      <span id="cooldownTxt" style="display:none;color:var(--text-3)"></span>
    </p>

    <button id="signOutBtn" style="font-size:12px;color:var(--text-3);background:none;border:none;cursor:pointer;margin-top:16px;text-decoration:underline;padding:0">
      Sign out and use different account
    </button>

  </div>
</div>
</div>

<script type="module">
  import { initTheme, startProgress, doneProgress, showToast } from './js/ui.js';
  import { auth, onAuthStateChanged, signOut, sendEmailVerification } from './js/firebase-config.js';
  import { initPageTransition } from './js/transition.js';

  initPageTransition(); startProgress(); initTheme(); doneProgress();

  const checkBtn    = document.getElementById('checkBtn');
  const resendBtn   = document.getElementById('resendBtn');
  const cooldownTxt = document.getElementById('cooldownTxt');
  const emailDisplay = document.getElementById('emailDisplay');

  let currentUser = null;
  let cooldownTimer = null;

  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = 'login.html'; return; }
    if (user.emailVerified) { window.location.href = 'dashboard.html'; return; }
    currentUser = user;
    emailDisplay.textContent = user.email;
  });

  // Check if verified
  checkBtn.addEventListener('click', async () => {
    if (!currentUser) return;
    checkBtn.disabled = true;
    checkBtn.innerHTML = '<span class="spinner"></span> Checking...';
    try {
      await currentUser.reload();
      if (currentUser.emailVerified) {
        showToast('Email verified! Welcome 🎉', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      } else {
        showToast('Not verified yet. Check your inbox.', 'error');
        checkBtn.disabled = false;
        checkBtn.textContent = "I've verified my email";
      }
    } catch {
      checkBtn.disabled = false;
      checkBtn.textContent = "I've verified my email";
    }
  });

  // Resend with cooldown
  function startCooldown() {
    let secs = 60;
    resendBtn.disabled = true;
    resendBtn.style.opacity = '0.4';
    cooldownTxt.style.display = 'inline';
    cooldownTxt.textContent = ` (${secs}s)`;
    cooldownTimer = setInterval(() => {
      secs--;
      cooldownTxt.textContent = ` (${secs}s)`;
      if (secs <= 0) {
        clearInterval(cooldownTimer);
        resendBtn.disabled = false;
        resendBtn.style.opacity = '1';
        cooldownTxt.style.display = 'none';
      }
    }, 1000);
  }

  resendBtn.addEventListener('click', async () => {
    if (!currentUser || resendBtn.disabled) return;
    try {
      await sendEmailVerification(currentUser);
      showToast('Verification email resent', 'success');
      startCooldown();
    } catch (err) {
      const msg = err.code === 'auth/too-many-requests'
        ? 'Too many requests. Wait a moment.'
        : 'Failed to resend. Try again.';
      showToast(msg, 'error');
    }
  });

  // Sign out
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
