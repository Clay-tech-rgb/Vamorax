<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Email | Vamorax</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body class="auth-page">
    <div id="progress-bar"></div> <div class="container">
        <div class="auth-card">
            <div id="status-icon" style="font-size: 3rem; margin-bottom: 1rem;">⏳</div>
            <h2 id="status-title">Memverifikasi...</h2>
            <p id="status-text" class="info-text">Mohon tunggu sebentar, sistem sedang memvalidasi akun lu.</p>

            <div class="auth-footer" id="footer-action" style="display: none;">
                <a href="login.html" class="btn-primary" style="text-decoration: none; display: inline-block; padding: 10px 20px;">Kembali ke Login</a>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initTheme, startProgress, doneProgress, showToast } from './js/ui.js';
        import { auth } from './js/firebase-config.js';
        import { applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initPageTransition } from './js/transition.js';

        // Inisialisasi Tema & Transisi
        initTheme();
        initPageTransition();

        // 1. Ambil oobCode dari URL (lemparan dari auth-handler)
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        // Referensi elemen UI
        const statusIcon = document.getElementById('status-icon');
        const statusTitle = document.getElementById('status-title');
        const statusText = document.getElementById('status-text');
        const footerAction = document.getElementById('footer-action');

        async function verifyEmail() {
            if (!actionCode) {
                showToast("Kode verifikasi tidak ditemukan.", "error");
                statusIcon.innerText = "❌";
                statusTitle.innerText = "Akses Ditolak";
                statusText.innerText = "Lu masuk ke halaman ini tanpa kode verifikasi yang valid.";
                footerAction.style.display = "block";
                return;
            }

            try {
                startProgress();
                
                // 2. Eksekusi verifikasi kode ke Firebase
                await applyActionCode(auth, actionCode);
                
                doneProgress();
                
                // UI Sukses
                statusIcon.innerText = "✅";
                statusTitle.innerText = "Verifikasi Berhasil!";
                statusText.innerText = "Akun lu sekarang sudah aktif. Mengalihkan ke login dalam 3 detik...";
                showToast("Email berhasil diverifikasi! 🎉", "success");

                // Auto redirect ke login
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3500);

            } catch (error) {
                doneProgress();
                console.error("Firebase Verify Error:", error);
                
                // UI Gagal
                statusIcon.innerText = "❌";
                statusTitle.innerText = "Verifikasi Gagal";
                statusText.innerText = "Link sudah kadaluarsa atau kode sudah pernah digunakan sebelumnya.";
                footerAction.style.display = "block";
                
                showToast("Gagal memverifikasi email.", "error");
            }
        }

        // Jalankan fungsi verifikasi otomatis saat page load
        verifyEmail();
    </script>
</body>
</html>
