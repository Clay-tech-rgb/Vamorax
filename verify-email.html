<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifikasi Email | Vamorax</title>
  
  <style>
    :root { --bg: #0a0a0a; --card: #161616; --primary: #007bff; --text: #ffffff; }
    body { 
      margin: 0; padding: 0; background: var(--bg); color: var(--text); 
      font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
    }
    /* Gaya Orb Vamorax Lu */
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; z-index: 1; }
    .orb-1 { width: 300px; height: 300px; background: #007bff; top: -100px; right: -100px; }
    .orb-2 { width: 250px; height: 250px; background: #6610f2; bottom: -50px; left: -50px; }

    .card { 
      background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      width: 100%; max-width: 350px; text-align: center; z-index: 10; backdrop-filter: blur(10px);
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }
    h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
    p { color: #888; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; }
    .btn { 
      display: inline-block; padding: 12px 24px; background: var(--primary); color: white; 
      text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 0.9rem; transition: 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.4); }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <span id="status-icon" class="icon">⏳</span>
    <h2 id="status-title">Memverifikasi...</h2>
    <p id="status-text">Tunggu sebentar, Le. Sistem lagi lapor ke Firebase biar akun lu aktif.</p>
    
    <div id="action-area">
        <a href="login.html" class="btn">Kembali ke Login</a>
    </div>
  </div>

  <script type="module">
    // TIPS: Kalo tetep blank, cek Console (F12). Pasti ada 'Failed to load resource'
    try {
        // Import dari file lokal lu
        import { auth } from './js/firebase-config.js';
        import { applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const params = new URLSearchParams(window.location.search);
        const code = params.get('oobCode');

        const sIcon = document.getElementById('status-icon');
        const sTitle = document.getElementById('status-title');
        const sText = document.getElementById('status-text');

        if (code) {
            applyActionCode(auth, code)
                .then(() => {
                    sIcon.innerText = "✅";
                    sTitle.innerText = "Berhasil!";
                    sText.innerText = "Email lu udah diverifikasi. Sekarang lu udah bisa login dan akses dashboard.";
                    setTimeout(() => window.location.href = 'login.html', 3000);
                })
                .catch((err) => {
                    console.error(err);
                    sIcon.innerText = "❌";
                    sTitle.innerText = "Link Basi";
                    sText.innerText = "Wah, link verifikasi lu udah expired atau udah pernah dipake sebelumnya.";
                });
        } else {
            sIcon.innerText = "⚠️";
            sTitle.innerText = "Akses Ditolak";
            sText.innerText = "Lu nyasar ke sini tanpa kode verifikasi yang bener. Cek Gmail lu lagi, Le.";
        }
    } catch (e) {
        console.error("FATAL SCRIPT ERROR:", e);
        document.getElementById('status-text').innerText = "Script Error! Cek folder js/firebase-config.js lu udah bener belum?";
    }
  </script>
</body>
</html>
