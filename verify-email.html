<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo Vm.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — Vamorax</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script>history.replaceState(null,'','/verify-email')</script>
</head>
<body>
<div id="top-progress"></div>
<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
</div>

<div class="page-content">
<div class="auth-wrap">
  <div class="auth-card" style="text-align:center">

    <div style="width:56px;height:56px;background:var(--surface);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>

    <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px">Check your email</h1>
    <p style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:24px">
      We sent a verification link to <strong id="verifyEmail" style="color:var(--text)"></strong>.<br>
      Click the link to activate your account.
    </p>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:12px;color:var(--text-2);margin-bottom:24px;text-align:left">
      <strong style="color:var(--text)">Didn't receive it?</strong><br>
      Check your spam folder, or click below to resend.
    </div>

    <button class="btn btn-primary w-full" style="justify-content:center;margin-bottom:10px" id="resendBtn">
      Resend verification email
    </button>
    <a href="login.html" class="btn btn-ghost w-full" style="justify-content:center">
      Back to sign in
    </a>

    <p id="resendMsg" style="font-size:12px;color:var(--text-3);margin-top:12px;display:none"></p>
  </div>
</div>
</div>

<script type="module">
  import { initTheme, startProgress, doneProgress } from './js/ui.js';
  import { auth, sendEmailVerification, onAuthStateChanged } from './js/firebase-config.js';
  import { initPageTransition } from './js/transition.js';

  initPageTransition();
  startProgress();
  initTheme();
  doneProgress();

  const emailEl  = document.getElementById('verifyEmail');
  const resendBtn = document.getElementById('resendBtn');
  const resendMsg = document.getElementById('resendMsg');

  onAuthStateChanged(auth, user => {
    if (!user) {
      if (emailEl) emailEl.textContent = localStorage.getItem('pending_verify_email') || 'your email';
      return;
    }
    if (user.emailVerified) { window.location.href = 'dashboard.html'; return; }
    if (emailEl) emailEl.textContent = user.email;
    localStorage.setItem('pending_verify_email', user.email);
  });

  resendBtn.addEventListener('click', async () => {
    const user = auth.currentUser;
    if (!user) {
      resendMsg.textContent = 'Session expired. Please sign in again.';
      resendMsg.style.color = 'var(--text-3)';
      resendMsg.style.display = 'block';
      setTimeout(() => window.location.href = 'login.html', 1500);
      return;
    }
    resendBtn.disabled = true;
    resendBtn.textContent = 'Sending...';
    try {
      const actionCodeSettings = {
        url: window.location.origin + '/auth-handler.html',
        handleCodeInApp: false,
      };
      await sendEmailVerification(user, actionCodeSettings);
      resendMsg.textContent = '✓ Sent! Check your inbox and spam folder.';
      resendMsg.style.color = '#4ade80';
    } catch (e) {
      resendMsg.textContent = e.code === 'auth/too-many-requests'
        ? 'Too many requests. Wait a few minutes.'
        : 'Failed to send. Try again.';
      resendMsg.style.color = '#ef4444';
    }
    resendMsg.style.display = 'block';
    setTimeout(() => { resendBtn.disabled = false; resendBtn.textContent = 'Resend verification email'; }, 60000);
  });

  // If user signs in and is verified, redirect to dashboard
  onAuthStateChanged(auth, user => {
    if (user?.emailVerified) window.location.href = 'dashboard.html';
  });

  // Poll every 3s — detects when user verifies in another tab
  const poll = setInterval(async () => {
    const user = auth.currentUser;
    if (!user) return;
    try {
      await user.reload(); // refresh token from Firebase server
      if (user.emailVerified) {
        clearInterval(poll);
        showToast('Email verified! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 800);
      }
    } catch {}
  }, 3000);
</script>
</body>
</html>
