<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo Vm.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Vamorax</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* Tambahan style darurat biar gak "ilang" UI-nya */
    .auth-container {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; padding: 20px;
    }
    .auth-card {
      background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px);
      padding: 32px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      width: 100%; max-width: 400px; text-align: center;
    }
    input { 
      width: 100%; padding: 12px; margin: 16px 0; border-radius: 8px; 
      background: rgba(0,0,0,0.3); border: 1px solid #444; color: white;
    }
    button { 
      width: 100%; padding: 12px; border-radius: 8px; background: #007bff; 
      color: white; border: none; cursor: pointer; font-weight: 600;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <h2 style="margin-bottom: 8px;">Reset Password</h2>
      <p id="status-text" style="font-size: 13px; color: #aaa; margin-bottom: 24px;">Memvalidasi link...</p>

      <div id="form-reset" style="display: none;">
        <input type="password" id="new-password" placeholder="Masukkan password baru" required>
        <button id="btn-reset">Update Password</button>
      </div>

      <div id="error-action" style="display: none; margin-top: 16px;">
        <a href="login.html" style="color: #007bff; text-decoration: none; font-size: 13px;">Kembali ke Login</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    // IMPORT HARUS BENER PATH-NYA
    import { initTheme, startProgress, doneProgress, showToast } from './js/ui.js';
    import { auth } from './js/firebase-config.js';
    import { verifyPasswordResetCode, confirmPasswordReset } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 1. Inisialisasi
    initTheme();
    const urlParams = new URLSearchParams(window.location.search);
    const actionCode = urlParams.get('oobCode');

    const statusText = document.getElementById('status-text');
    const formReset = document.getElementById('form-reset');
    const btnReset = document.getElementById('btn-reset');
    const errorAction = document.getElementById('error-action');

    // 2. Jalankan Cek Kode
    if (!actionCode) {
        statusText.innerText = "Link tidak valid atau kode hilang.";
        errorAction.style.display = 'block';
    } else {
        startProgress();
        verifyPasswordResetCode(auth, actionCode)
            .then((email) => {
                doneProgress();
                statusText.innerText = "Email: " + email;
                formReset.style.display = 'block';
            })
            .catch((err) => {
                doneProgress();
                statusText.innerText = "Link sudah kadaluarsa atau tidak valid.";
                errorAction.style.display = 'block';
                console.error(err);
            });
    }

    // 3. Reset Action
    btnReset.addEventListener('click', async () => {
        const pass = document.getElementById('new-password').value;
        if (pass.length < 6) return showToast("Password minimal 6 karakter!", "error");

        try {
            startProgress();
            btnReset.disabled = true;
            btnReset.innerText = "Updating...";
            
            await confirmPasswordReset(auth, actionCode, pass);
            
            doneProgress();
            showToast("Password berhasil diubah!", "success");
            setTimeout(() => window.location.href = 'login.html', 2000);
        } catch (e) {
            doneProgress();
            btnReset.disabled = false;
            btnReset.innerText = "Update Password";
            showToast("Gagal: " + e.message, "error");
        }
    });
  </script>
</body>
</html>
