<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Vamorax</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body class="auth-page">
    <div id="progress-bar"></div> <div class="container">
        <div class="auth-card">
            <h2>Setel Ulang Password</h2>
            <p id="status-text" class="info-text">Memvalidasi kode reset...</p>

            <div id="reset-form" style="display: none;">
                <div class="input-group">
                    <label for="new-password">Password Baru</label>
                    <input type="password" id="new-password" placeholder="Minimal 6 karakter" required>
                </div>
                
                <button id="btn-reset" class="btn-primary">Update Password</button>
            </div>

            <div class="auth-footer">
                <a href="login.html">Kembali ke Login</a>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        // Import sesuai struktur yang lu kasih tadi
        import { initTheme, startProgress, doneProgress, showToast } from './js/ui.js';
        import { auth } from './js/firebase-config.js';
        import { verifyPasswordResetCode, confirmPasswordReset } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initPageTransition } from './js/transition.js';

        // Jalankan inisialisasi awal
        initTheme();
        initPageTransition();

        // 1. Ambil oobCode dari URL (lemparan dari auth-handler)
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        // Referensi elemen UI
        const resetForm = document.getElementById('reset-form');
        const newPasswordInput = document.getElementById('new-password');
        const resetBtn = document.getElementById('btn-reset');
        const statusText = document.getElementById('status-text');

        // 2. Validasi kode reset saat halaman dibuka
        if (!actionCode) {
            showToast("Link tidak valid atau kode hilang.", "error");
            statusText.innerText = "Akses ditolak. Silakan minta link reset baru.";
            setTimeout(() => window.location.href = 'login.html', 3000);
        } else {
            startProgress();
            verifyPasswordResetCode(auth, actionCode)
                .then((email) => {
                    doneProgress();
                    // Jika kode valid, tampilkan form dan info email
                    statusText.innerText = `Mengatur ulang password untuk: ${email}`;
                    resetForm.style.display = 'block';
                    showToast("Silakan masukkan password baru lu.", "info");
                })
                .catch((error) => {
                    doneProgress();
                    console.error("Firebase Error:", error);
                    statusText.innerText = "Link sudah kadaluarsa atau sudah pernah dipakai.";
                    showToast("Link reset tidak berlaku lagi.", "error");
                });
        }

        // 3. Eksekusi Ganti Password
        if (resetBtn) {
            resetBtn.addEventListener('click', async () => {
                const newPassword = newPasswordInput.value;

                // Validasi Client-side simpel
                if (newPassword.length < 6) {
                    showToast("Password minimal 6 karakter, King!", "warning");
                    return;
                }

                try {
                    startProgress();
                    resetBtn.disabled = true; // Anti-spam klik
                    resetBtn.innerText = "Updating...";

                    await confirmPasswordReset(auth, actionCode, newPassword);
                    
                    doneProgress();
                    showToast("Password berhasil diubah! 🎉", "success");
                    
                    // Redirect setelah user sukses ganti password
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);

                } catch (error) {
                    doneProgress();
                    resetBtn.disabled = false;
                    resetBtn.innerText = "Update Password";
                    
                    let errorMsg = "Gagal mengubah password.";
                    if (error.code === 'auth/weak-password') errorMsg = "Password terlalu lemah!";
                    
                    showToast(errorMsg, "error");
                    console.error(error);
                }
            });
        }
    </script>
</body>
</html>
