<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><link rel="icon" type="image/png" href="logo Vm.png" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Vamorax</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script>history.replaceState(null,'','/reset-password')</script>
</head>
<body>
<div id="top-progress"></div>
<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
</div>

<div class="page-content">
<div class="auth-wrap">
  <div class="auth-card">

    <div style="margin-bottom:28px">
      <div style="font-size:12px;color:var(--text-3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Vamorax</div>
      <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px" id="pageTitle">Reset password</h1>
      <p style="font-size:13px;color:var(--text-2)" id="pageDesc">Enter your new password below.</p>
    </div>

    <!-- Invalid/expired link -->
    <div id="state-invalid" style="display:none;text-align:center;padding:8px 0">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">This reset link is invalid or has expired.</p>
      <a href="forgot-password.html" class="btn btn-primary btn-sm" style="justify-content:center">Request new link</a>
    </div>

    <!-- Reset form -->
    <div id="state-form">
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label">New password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="newPw" placeholder="Min. 6 characters" required minlength="6" style="padding-right:40px" />
            <button type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px" onclick="togglePw(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label">Confirm new password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="confirmPw" placeholder="Repeat password" required style="padding-right:40px" />
            <button type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px" onclick="togglePw(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center" id="resetBtn">Set new password</button>
      </form>
    </div>

    <!-- Success -->
    <div id="state-success" style="display:none;text-align:center;padding:8px 0">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style="font-size:16px;font-weight:600;margin-bottom:8px">Password updated</h2>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">Your password has been changed. You can now sign in.</p>
      <a href="login.html" class="btn btn-primary btn-sm" style="justify-content:center;width:100%">Sign in</a>
    </div>

  </div>
</div>
</div>

<script>
  function togglePw(btn) {
    const input = btn.previousElementSibling;
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    const svg = btn.querySelector('svg');
    svg.innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    btn.style.color = isHidden ? 'var(--text-2)' : 'var(--text-3)';
  }
</script>
<script type="module">
  import { initTheme, startProgress, doneProgress, showToast } from './js/ui.js';
  import { auth } from './js/firebase-config.js';
  import { verifyPasswordResetCode, confirmPasswordReset }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { initPageTransition } from './js/transition.js';

  initPageTransition(); startProgress(); initTheme(); doneProgress();

  const params  = new URLSearchParams(window.location.search);
  const oobCode = params.get('oobCode');

  const stateInvalid = document.getElementById('state-invalid');
  const stateForm    = document.getElementById('state-form');
  const stateSuccess = document.getElementById('state-success');

  if (!oobCode) {
    stateForm.style.display = 'none';
    stateInvalid.style.display = 'block';
  } else {
    // Verify the code is valid
    verifyPasswordResetCode(auth, oobCode).catch(() => {
      stateForm.style.display = 'none';
      stateInvalid.style.display = 'block';
    });
  }

  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    const pw      = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;
    const btn     = document.getElementById('resetBtn');

    if (pw !== confirm) { showToast('Passwords do not match', 'error'); return; }
    if (pw.length < 6)  { showToast('Password must be at least 6 characters', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Updating...';

    try {
      await confirmPasswordReset(auth, oobCode, pw);
      stateForm.style.display    = 'none';
      stateSuccess.style.display = 'block';
      document.getElementById('pageTitle').textContent = 'Password updated';
      document.getElementById('pageDesc').textContent  = '';
    } catch (err) {
      const msg = err.code === 'auth/expired-action-code'
        ? 'Reset link has expired. Request a new one.'
        : err.code === 'auth/weak-password'
        ? 'Password is too weak.'
        : 'Failed to reset password. Try again.';
      showToast(msg, 'error');
      btn.disabled = false;
      btn.textContent = 'Set new password';
    }
  });
</script>
</body>
</html>
