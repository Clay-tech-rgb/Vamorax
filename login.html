<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><link rel="icon" type="image/png" href="logo Vm.png" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Vamorax</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script>history.replaceState(null,'','/login')</script>
</head>
<body>
<div id="top-progress"></div>

<div class="auth-bg">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>
</div>

<div class="page-content">
<div class="auth-wrap">
  <div class="auth-card">

    <div style="margin-bottom:28px">
      <a href="index.html" style="font-size:12px;color:var(--text-3);display:inline-flex;align-items:center;gap:5px;margin-bottom:20px;transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-3)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
      <div style="font-size:12px;color:var(--text-3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Vamorax</div>
      <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px" id="auth-heading">Sign in</h1>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign in</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>

    <!-- Social login — always visible, never moves -->
    <div class="social-login-btns">
      <button class="social-login-btn" onclick="handleSocialLogin('google')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span>Continue with Google</span>
      </button>
      <button class="social-login-btn" onclick="handleSocialLogin('apple')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <span>Continue with Apple</span>
      </button>
    </div>

    <div class="auth-divider">or</div>

    <!-- Animated form area — only this part switches -->
    <div class="auth-form-wrap">

      <div id="tab-login" class="auth-form-panel">
        <form id="email-login-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-label">Password</label>
            <div style="position:relative">
              <input class="form-input" type="password" name="password" placeholder="Password" required style="padding-right:40px" />
              <button type="button" class="pw-toggle" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px" onclick="togglePw(this)">
                <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div style="text-align:right;margin-top:6px">
              <a href="forgot-password.html" style="font-size:12px;color:var(--text-3);transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-3)'">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Sign in</button>
        </form>
      </div>

      <div id="tab-register" class="auth-form-panel hidden">
        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position:relative">
              <input class="form-input" type="password" name="password" placeholder="Min. 8 characters" required minlength="8" style="padding-right:40px" />
              <button type="button" class="pw-toggle" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px" onclick="togglePw(this)">
                <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">Confirm password</label>
            <div style="position:relative">
              <input class="form-input" type="password" name="confirm" placeholder="Repeat password" required style="padding-right:40px" />
              <button type="button" class="pw-toggle" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px" onclick="togglePw(this)">
                <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div style="margin-bottom:16px" id="recaptcha-container"></div>
          <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Create account</button>
        </form>
      </div>

    </div>
  </div>
</div><!-- /page-content -->

<script>
  // Show/hide password toggle
  function togglePw(btn) {
    const input = btn.previousElementSibling || btn.parentElement.querySelector('input');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    const svg = btn.querySelector('svg');
    svg.innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    btn.style.color = isHidden ? 'var(--text-2)' : 'var(--text-3)';
  }
</script>
<script type="module">
  import { initTheme, startProgress, doneProgress, showToast, initSmoothScroll } from './js/ui.js';
  import { initLoginPage, isLoggedIn, signInWithGoogle } from './js/auth.js';
  import { initPageTransition } from './js/transition.js';
  import { initWaveBackground } from './js/animations.js';
  import { auth, onAuthStateChanged, sendPasswordResetEmail } from './js/firebase-config.js';
  import { addHoneypot, disableConsoleInProd } from './js/security.js';

  initPageTransition();
  initWaveBackground();
  disableConsoleInProd();
  startProgress();
  initTheme();
  initSmoothScroll();

  // Redirect if already logged in and verified
  onAuthStateChanged(auth, user => {
    if (!user) return;
    // Google users are auto-verified
    const isGoogle = user.providerData?.[0]?.providerId !== 'password';
    if (user.emailVerified || isGoogle) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'verify-email.html';
    }
  });

  initLoginPage();
  // Add honeypot to both forms
  document.querySelectorAll('form').forEach(f => addHoneypot(f));
  doneProgress();

  // Forgot password
  document.getElementById('forgotBtn')?.addEventListener('click', async () => {
    const emailInput = document.querySelector('#email-login-form [name="email"]');
    const email = emailInput?.value.trim();
    if (!email) {
      showToast('Enter your email first', 'error');
      emailInput?.focus();
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      showToast('Reset link sent to ' + email, 'success');
    } catch (err) {
      const msg = err.code === 'auth/user-not-found'
        ? 'No account found with this email.'
        : 'Failed to send reset email.';
      showToast(msg, 'error');
    }
  });

  // Google sign in button
  window.handleSocialLogin = async (provider) => {
    if (provider === 'google') {
      await signInWithGoogle();
    } else {
      showToast(`${provider} login coming soon`, 'info');
    }
  };

  // Tab switching with slide animation
  const tabs = document.querySelectorAll('.auth-tab');
  const panels = { login: document.getElementById('tab-login'), register: document.getElementById('tab-register') };
  let currentTab = 'login';

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      const next = btn.dataset.tab;
      if (next === currentTab) return;

      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('auth-heading').textContent = next === 'login' ? 'Sign in' : 'Create account';

      const goingRight = next === 'register';
      const outPanel = panels[currentTab];
      const inPanel = panels[next];

      // Fade out current
      outPanel.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
      outPanel.style.opacity = '0';
      outPanel.style.transform = `translateX(${goingRight ? '-16px' : '16px'})`;

      setTimeout(() => {
        outPanel.classList.add('hidden');
        outPanel.style.transition = '';
        outPanel.style.opacity = '';
        outPanel.style.transform = '';

        inPanel.classList.remove('hidden');
        inPanel.style.opacity = '0';
        inPanel.style.transform = `translateX(${goingRight ? '20px' : '-20px'})`;

        // Force reflow
        inPanel.offsetHeight;

        inPanel.style.transition = 'opacity 0.32s cubic-bezier(0.34,1.56,0.64,1), transform 0.32s cubic-bezier(0.34,1.56,0.64,1)';
        inPanel.style.opacity = '1';
        inPanel.style.transform = 'translateX(0)';

        setTimeout(() => { inPanel.style.transition = ''; }, 350);
        currentTab = next;
        if (next === 'register') initRecaptchaWidget();
      }, 180);
    });
  });

  // Init reCAPTCHA v2 widget when register tab is shown
  let recaptchaWidgetId = null;
  function initRecaptchaWidget() {
    if (recaptchaWidgetId !== null) return;
    if (!window.grecaptcha) { setTimeout(initRecaptchaWidget, 500); return; }
    recaptchaWidgetId = window.grecaptcha.render('recaptcha-container', {
      sitekey: '6LcbQaQsAAAAAKE6r0wj_2X--DsEb0f15kXWE2gn',
      theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light',
    });
  }

  // Register validation — check reCAPTCHA v2
  document.getElementById('register-form')?.addEventListener('submit', e => {
    const pw      = e.target.querySelector('[name="password"]').value;
    const confirm = e.target.querySelector('[name="confirm"]').value;
    if (pw !== confirm) { e.preventDefault(); showToast('Passwords do not match', 'error'); return; }
    const token = window.grecaptcha?.getResponse(recaptchaWidgetId);
    if (!token) { e.preventDefault(); showToast('Please complete the reCAPTCHA', 'error'); return; }
  });
</script>
</body>
</html>
